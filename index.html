<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <title>四十九蓍 | Forty-Nine</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

        font-family: "Songti SC", "STSong", "Noto Serif SC", "Source Han Serif SC", "PingFang SC", "Hiragino Sans GB", serif;
        font-size: clamp(16px, 1.4vw, 20px);
        line-height: 1.5;
        user-select: none;
        -webkit-user-select: none;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        -webkit-tap-highlight-color: transparent;

      body {
        min-height: 100dvh;
      }

  </head>
